<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silhouette | Architectural & Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Slideshow -->
    <div id="slideshow-container">
        <!-- Images injected by script.js -->
    </div>

    <!-- Main Landing View -->
    <main class="landing-view">
        <!-- Top Left: Logo -->
        <div class="corner-top-left">
            <img src="images/logo.jpg" alt="Silhouette Logo" class="main-logo">
        </div>

        <!-- Top Right: Slogan -->
        <div class="corner-top-right">
            <h1 class="slogan-text">
                ARCHITECTURE<br>
                ENGINEERING<br>
                LANDSCAPE<br>
                by design.
            </h1>
        </div>

        <!-- Bottom Left: Location & Audio -->
        <div class="corner-bottom-left">
            <p class="location-text">Riyadh, KSA</p>
            <button id="audio-toggle-btn" class="audio-toggle" aria-label="Mute/Unmute">
                <div id="audio-on-icon" class="audio-icon">
                    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 30 30" width="24" height="24">
                        <path d="M23 6.616a.625.625 0 0 0-.727-.609l-10.241 1.54a.62.62 0 0 0-.535.609l-.006 10.016c0 .892-.276 1.319-1.971 1.319C7.646 19.49 7 20.631 7 21.748 7 22.655 7.507 24 9.516 24c2.249 0 3.236-1.44 3.236-2.713l.006-9.719 8.98-1.454v6.87c-.045.763-.401 1.13-1.973 1.13-1.874 0-2.52 1.141-2.52 2.258 0 .907.507 2.252 2.516 2.252 2.249 0 3.236-1.44 3.236-2.713L23 6.616z" fill="currentColor"></path>
                    </svg>
                </div>
                <div id="audio-off-icon" class="audio-icon hidden">
                    <svg preserveAspectRatio="xMidYMid meet" viewBox="0 0 30 30" width="24" height="24">
                        <path d="M27.39 17.535a.478.478 0 0 1 .306.615v.001a.51.51 0 0 1-.641.292L6.074 12.471a.478.478 0 0 1-.325-.605.505.505 0 0 1 .661-.302l20.98 5.971zm-6.211.375c1.911-.377 1.812 2.001 1.813 2.001 0 1.273-.986 2.713-3.235 2.713-2.009 0-2.515-1.345-2.515-2.252 0-1.117.646-2.258 2.519-2.258.671-.001 1.095-.141 1.418-.204zm-8.427-1.643v.013h.001l-.005 5.007c0 1.273-.985 2.713-3.233 2.713C7.506 24 7 22.655 7 21.748c0-1.117.646-2.258 2.519-2.258 1.696 0 1.972-.427 1.972-1.319l.001-1.934a.513.513 0 0 1 .512-.477h.23c.285 0 .518.228.518.507zm-.537-4.642a.666.666 0 0 1-.506-.141.61.61 0 0 1-.22-.468l.006-2.86c0-.304.227-.562.535-.609l10.238-1.54a.629.629 0 0 1 .726.609L23 13.591c0 .013-.006.024-.007.036a.49.49 0 0 1-.094.248.516.516 0 0 1-.416.222h-.229a.51.51 0 0 1-.517-.505l-.004-3.479-9.518 1.512z" fill="currentColor"></path>
                    </svg>
                </div>
            </button>
        </div>

        <!-- Bottom Right: Navigation -->
        <div class="corner-bottom-right">
            <nav class="main-nav">
                <button class="nav-btn" data-target="about">ABOUT</button>
                <button class="nav-btn" data-target="services">SERVICES</button>
                <button class="nav-btn" data-target="projects">PROJECTS</button>
                <button class="nav-btn" data-target="team">TEAM</button>
            </nav>
        </div>
    </main>

    <!-- Overlay Modal for Content -->
    <div class="modal-overlay" id="content-modal">
        <div class="modal-inner">
            <button class="close-modal" id="close-modal-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="modal-content" id="modal-content-area">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
